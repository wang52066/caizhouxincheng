  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== 导航 ===== -->
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <span>蔡州芯辰</span>
          <small>工业设计网店</small>
        </div>
      </a>
      <nav class="nav-links">
        <a class="nav-link active" href="index.html">首页</a>
        <a class="nav-link" href="about.html">关于我们</a>
        <a class="nav-link" href="services.html">产品服务</a>
        <a class="nav-link" href="contact.html">联系我们</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>
        </button>
        <a class="btn btn-primary nav-cta" href="contact.html">
          立即咨询
          <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
        <button class="menu-btn" id="menuBtn" aria-label="打开菜单">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== 移动菜单 ===== -->
  <div class="mobile-menu" id="mobileMenu">
    <div class="head">
      <a href="index.html" class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text"><span>蔡州芯辰</span><small>工业设计网店</small></div>
      </a>
      <button class="menu-btn" id="closeMenu" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <nav>
      <a href="index.html">首页</a>
      <a href="about.html">关于我们</a>
      <a href="services.html">产品服务</a>
      <a href="contact.html">联系我们</a>
    </nav>
  </div>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="hero-grid-bg" aria-hidden="true"></div>
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-glow b" aria-hidden="true"></div>
    <div class="container hero-inner">
      <div class="hero-text">
        <span class="eyebrow reveal">PCB · 工业设计 · 精密制造</span>
        <h1 class="reveal" data-d="1">
          专业电路 PCB<br />
          <span class="grad">设计服务</span>
        </h1>
        <p class="lead reveal" data-d="2">
          上蔡县蔡州芯辰工业设计网店,专注电路 PCB 设计全流程服务。从原理图绘制、PCB 布局布线到生产文件输出,工程师团队为您的产品提供从 0 到 1 的工程交付支持。
        </p>
        <div class="hero-actions reveal" data-d="3">
          <a class="btn btn-primary" href="contact.html">
            获取免费评估
          </a>
          <a class="btn btn-ghost" href="services.html">查看服务范围</a>
        </div>
        <div class="hero-stats reveal" data-d="4">
          <div>
            <div class="num">200+</div>
            <div class="label">完成项目</div>
          </div>
          <div>
            <div class="num">98%</div>
            <div class="label">客户满意度</div>
          </div>
          <div>
            <div class="num">24h</div>
            <div class="label">快速响应</div>
          </div>
        </div>
      </div>

      <div class="hero-visual reveal" data-d="2">
        <div class="pcb-card">
          <div class="pcb-trace"></div>
          <div class="pcb-pad p1"></div>
          <div class="pcb-pad p2"></div>
          <div class="pcb-pad p3"></div>
          <div class="pcb-pad p4"></div>
          <div class="pcb-pad p5"></div>
          <div class="pcb-pad p6"></div>
          <div class="pcb-pad p7"></div>
          <div class="pcb-pad p8"></div>
          <div class="pcb-chip"></div>
        </div>
        <div class="float-badge b1">
          <div class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </div>
          <div class="text">
            <b>高速信号</b>
            阻抗匹配优化
          </div>
        </div>
        <div class="float-badge b2">
          <div class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
          </div>
          <div class="text">
            <b>DFM 审查</b>
            生产无忧
          </div>
        </div>
      </div>
    </div>

  <!-- ===== 客户标识 ===== -->
  <section class="trust">
    <div class="container">
      <p class="trust-label reveal">已为众多行业客户提供设计服务</p>
      <div class="trust-logos reveal" data-d="1">
        <div class="logo">智造科技</div>
        <div class="logo">蓝光电子</div>
        <div class="logo">汉芯微</div>
        <div class="logo">银河电气</div>
        <div class="logo">矽力杰</div>
        <div class="logo">远见智能</div>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
